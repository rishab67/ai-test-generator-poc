name: Enterprise API Test Suite

# 1. When should this pipeline run?
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

# 2. What computer should we rent, and what should it do?
jobs:
  api-testing:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4

    - name: 🐍 Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: 📦 Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium

    - name: 🚀 Run AI Test Framework
      env:
        API_KEY: ${{ secrets.API_KEY }}
      run: |
        pytest tests/ --alluredir=allure-results

    - name: 📊 Save Test Evidence
      if: always() # This forces GitHub to save the data even if tests fail!
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: allure-results
        retention-days: 7